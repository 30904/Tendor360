# Tender360 — example nginx site (Ubuntu 22.04+)
# Install: sudo cp deploy/nginx/tender360.conf /etc/nginx/sites-available/tender360
#          sudo ln -sf /etc/nginx/sites-available/tender360 /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites on server:
#   - frontend built:  cd frontend && npm run build  →  frontend/dist/
#   - backend running: PM2 on 127.0.0.1:5025 (see deploy/ecosystem.config.cjs)
#   - paths below match your deploy user (example: /var/www/tender360)

server {
    listen 80;
    server_name tender360.smart-aiapps.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tender360.smart-aiapps.com;

    # ssl_certificate     /etc/letsencrypt/live/tender360.smart-aiapps.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tender360.smart-aiapps.com/privkey.pem;

    # --- IMPORTANT: must exist and be readable by www-data ---
    root /var/www/tender360/frontend/dist;
    index index.html;

    client_max_body_size 55M;

    access_log /var/log/nginx/tender360.access.log;
    error_log  /var/log/nginx/tender360.error.log warn;

    # API → Node backend
    location /api/ {
        proxy_pass http://127.0.0.1:5025;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Uploaded files (if served via backend)
    location /uploads/ {
        proxy_pass http://127.0.0.1:5025;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA — static assets + fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: avoid 404 noise in browser console
    location = /favicon.ico {
        try_files /favicon.svg /pwa-192.png =404;
        access_log off;
    }
}
